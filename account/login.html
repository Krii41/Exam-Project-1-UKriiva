<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Log in to your The Edit account to continue shopping.">
    <meta name="keywords" content="login, account, sign in, user access">
    <meta name="author" content="Urve Kriiva">
    <link rel="stylesheet" href="../css/account.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/media.css">
    <title>Login | The Edit</title>
</head>

<body>
    <header>
        <nav>
            <a href="../account/login.html" class="login">
                <img src="../assets/icons/login.png" alt="login">
            </a>
            <a href="../index.html" class="logo">
                <img src="../assets/images/logo.png"  alt="The Edit">
            </a>
            <a href="../cart/index.html" class="cart-img">
                <img src="../assets/icons/cart.png" alt="">
                <span id="cart-count" class="badge" hidden></span>
            </a>
        </nav>
    </header>
    <main>
        <h1>Login</h1>
        <form id="login-form" class="grid">
            <label for="email">E-mail</label>
            <input type="text" id="email" name="email" placeholder="example@gmail.com" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="password" required>
            <button type="submit" class="cta-button btn-form">Login</button>
        </form>
        <p>Don't have an account?
            <a href="register.html" class="link-primary">Register</a>
        </p>
    </main>
    <footer>
        <div class="footer-content">
            <div class="footer-logo">
                <img src="../assets/images/logo-footer.png" alt="The Edit">
            </div>
            <span class="slogan">
                <p>Curated for modern living</p>
            </span>
        </div>
        <div class="copyright">&copy; 2026 The Edit</div>
    </footer>
    <script type="module" src="../main.js"></script>
    <script type="module" src="../js/auth.js"></script>
</body>

</html>
