<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/account.css">
    <link rel="stylesheet" href="../css/media.css">
    <title>Register | The Edit</title>
</head>
<body>
    <header>
        <nav>
            <a href="../account/login.html" class="login">
                <img src="../assets/icons/login.png" alt="login">
            </a>
            <a href="../index.html" class="logo">
                <img src="../assets/images/logo.png"  alt="The Edit">
            </a>
            <a href="../cart/index.html" class="cart-img">
                <img src="../assets/icons/cart.png" alt="">
            </a>
        </nav>
    </header>
    <main>
        <h1>Register</h1>
        <form action="/action_page.php" class="grid">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" placeholder="full name" required>
            <label for="e-mail">E-mail</label>
            <input type="text" id="e-mail" name="e-mail" placeholder="example@gmail.com" required>
            <label for="password">Password</label>
            <input type="text" id="password" name="password" placeholder="password" required>
            <label for="confirmPassword">Confirm Password</label>
            <input type="text" id="confirmPassword" name="confirmPassword" placeholder="password" required>
            <button class="cta-button btn-form">Login</button>
        </form>
    </main>
    <footer>
        <div class="footer-content">
            <div class="footer-logo">
                <img src="../assets/images/logo-footer.png" alt="The Edit">
            </div>
            <span class="slogan">
                <p>Curated for modern living</p>
            </span>
        </div>
        <div class="copyright">&copy; 2026 The Edit</div>
    </footer>
    <script type="module" src="../main.js"></script>
</body>
</html>
