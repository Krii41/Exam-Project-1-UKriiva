<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/account.css">
    <link rel="stylesheet" href="../css/media.css">
    <title>Register | The Edit</title>
</head>
<body>
    <header id="header"></header>
    <main>
        <h1>Register</h1>
        <form action="/action_page.php">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" placeholder="full name" required>
            <label for="e-mail">E-mail</label>
            <input type="text" id="e-mail" name="e-mail" placeholder="example@gmail.com" required>
            <label for="password">Password</label>
            <input type="text" id="password" name="password" placeholder="password" required>
            <label for="confirmPassword">Confirm Password</label>
            <input type="text" id="confirmPassword" name="confirmPassword" placeholder="password" required>
            <button class="cta-button btn-form">Login</button>
        </form>
    </main>
    <footer id="footer"></footer>
    <script type="module" src="../js/main.js"></script>
</body>
</html>
