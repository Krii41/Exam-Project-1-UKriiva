<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="The Edit is a curated lifestyle store offering modern essentials across fashion, beauty, and technology.">
    <meta name="keywords" content="minimal design, fashion essentials, lifestyle products, everyday tech, beauty shop">
    <meta name="author" content="Urve Kriiva">
    <link rel="stylesheet" href="css/carousel.css">
    <link rel="stylesheet" href="css/catalog.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/media.css">
    <title>Home | The Edit</title>
</head>

<body>
    <header>
        <nav>
            <a href="account/login.html" class="login">
                <img src="assets/icons/login.png" alt="login">
            </a>
            <a href="index.html" class="logo">
                <img src="assets/images/logo.png" alt="The Edit">
            </a>
            <a href="cart/index.html" class="cart-img">
                <img src="assets/icons/cart.png" alt="">
                <span id="cart-count" class="badge" hidden></span>
            </a>
        </nav>
    </header>
    <main>
        <section class="hero">
            <div class="hero-slider" id="hero-slider"></div>
        </section>

        <section class="featured" data-section="featured">
            <div class="product-container">
                <h2>Featured</h2>
                <div class="products-grid">
                    <div class="card-large" data-slot="large"></div>
                    <div class="card card-small" data-slot="small-1"></div>
                    <div class="card card-small card-decorative">
                        <img src="assets/images/futured-img.jpg" alt="">
                    </div>
                    <div class="card card-small card-mystery" data-slot="mystery">
                        <a href="product/index.html" class="card-media">
                            <img class="card-img" src="assets/images/mysterybox.jpg" alt="">
                            <img class="card-img card-img-hover" src="" alt="">
                            <div class="card-overlay">
                                <h3>Mystery Item</h3>
                                <p>From The Edit</p>
                                <span>Tap to discover</span>
                            </div>
                        </a>
                        <div class="card-prices">
                            <span class="price"></span>
                            <span class="old-price"></span>
                        </div>
                    </div>
                    <div class="card card-small" data-slot="small-2"></div>
                </div>
            </div>
        </section>

        <section class="product-group" data-section="group">
            <div class="product-container">
                <div class="product-group-grid">
                    <div class="card card-small" data-slot="small-1"></div>
                    <div class="card card-small" data-slot="small-2"></div>
                    <div class="card card-large" data-slot="large"></div>
                </div>
            </div>
        </section>

        <section class="editors-picks" data-section="editors">
            <div class="product-container">
                <h2>Editor's picks</h2>
                <div class="products-grid">
                    <div class="card card-small" data-slot="small-1"></div>
                    <div class="card card-small card-decorative">
                        <img src="assets/images/editors-picks-img.jpg" alt="">
                    </div>
                    <div class="card card-small card-mystery" data-slot="mystery">
                        <a href="product/index.html" class="card-media">
                            <img class="card-img" src="assets/images/mysterybox.jpg" alt="">
                            <img class="card-img card-img-hover" src="" alt="">
                            <div class="card-overlay">
                                <h3>Mystery Item</h3>
                                <p>From The Edit</p>
                                <span>Tap to discover</span>
                            </div>
                        </a>
                        <div class="card-prices">
                            <span class="price"></span>
                            <span class="old-price"></span>
                        </div>
                    </div>
                    <div class="card card-small" data-slot="small-2"></div>
                    <div class="card-large" data-slot="large"></div>
                </div>
            </div>
        </section>

        <section class="product-group-tech" data-section="tech">
            <div class="product-container">
                <div class="product-group-grid">
                    <div class="card card-wide" data-slot="wide"></div>
                    <div class="card card-wide-small" data-slot="wide-small"></div>
                    <div class="card card-tall" data-slot="tall-1"></div>
                    <div class="card card-tall" data-slot="tall-2"></div>
                    <div class="card card-tall" data-slot="tall-3"></div>
                </div>
            </div>
        </section>

        <section class="this-season" data-section="season">
            <div class="product-container">
                <h2>This season</h2>
                <div class="product-group-grid">
                    <div class="card card-wide-small" data-slot="wide-small"></div>
                    <div class="card-wide-image">
                        <img src="assets/images/this-season-image.jpg" alt="">
                    </div>
                    <div class="card card-small">
                        <img src="assets/images/this-season-image-2.jpg" alt="">
                    </div>
                    <div class="card card-small" data-slot="small"></div>
                    <div class="card card-small card-mystery" data-slot="mystery">
                        <a href="product/index.html" class="card-media">
                            <img class="card-img" src="assets/images/mysterybox.jpg" alt="">
                            <img class="card-img card-img-hover" src="" alt="">
                            <div class="card-overlay">
                                <h3>Mystery Item</h3>
                                <p>From The Edit</p>
                                <span>Tap to discover</span>
                            </div>
                        </a>
                        <div class="card-prices">
                            <span class="price"></span>
                            <span class="old-price"></span>
                        </div>
                    </div>
                </div>
            </div>
        </section>


    </main>
    <footer>
        <div class="footer-content">
            <div class="footer-logo">
                <img src="assets/images/logo-footer.png" alt="The Edit">
            </div>
            <span class="slogan">
                <p>Curated for modern living</p>
            </span>
        </div>
        <div class="copyright">&copy; 2026 The Edit</div>
    </footer>
    <script type="module" src="main.js"></script>
</body>

</html>
