<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/product.css">
    <link rel="stylesheet" href="../css/media.css">
    <title>Product | The Edit</title>
</head>
<body>
    <header id="header"></header>
    <main>
        <article class="product-layout grid">
            <section class="product-image">   
                <img src="../assets/testimages/11-shampoo.jpg" alt="cold headphones">
            </section>

            <section class="product-details flex">
                <div class="product-header flex">
                    <h1>Gold Headphones</h1>
                    <button class="share-link">
                        <img src="../assets/icons/share.png" alt="Share product">
                    </button>
                </div>
                <div class="tags flex">
                    <span class="tag">Headphones</span>
                    <span class="tag">Fashion</span>
                </div>
                <div class="rating flex">
                    <img src="../assets/icons/star.png" alt="star">
                    <span>4.0</span>
                    <span>(1 review)</span>
                </div>
                <p class="price-current">$ 382.49</p>
                <p class="price-original">$ 449.99</p>
                <p>
                    Professional headphones with gold trim.
                </p>
                <button class="add-to-cart cta-button btn-primary">Add to Cart</button>
            </section>

            <section class="reviews">
                <h2>Reviews</h2>
                    <div class="review-list grid">
                        <article class="review flex">
                            <div class="review-rating flex">
                                <img src="../assets/icons/star.png" alt="">
                                <img src="../assets/icons/star.png" alt="">
                                <img src="../assets/icons/star.png" alt="">
                                <img src="../assets/icons/star.png" alt="">
                                <img src="../assets/icons/emptystar.png" alt="">
                            </div>
                            <blockquote class="review-text">"Good sound quality"</blockquote>
                            <p class="review-author">Michael J.</p>
                        </article>
                    </div>
            </section>
        </article>
    </main>
    <footer id="footer"></footer>
    <script type="module" src="../js/main.js"></script>
</body>
</html>
