<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Shop premium products with modern design, great quality, and everyday usability.">
    <meta name="keywords" content="electronics, fashion, accessories, gadgets, lifestyle products">
    <meta name="author" content="Urve Kriiva">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/product.css">
    <link rel="stylesheet" href="../css/media.css">
    <title>Product | The Edit</title>
</head>

<body>
    <header>
        <nav>
            <a href="../account/login.html" class="login">
                <div class="login-container">
                    <img src="../assets/icons/login.png" alt="login">
                    <span class="login-txt">Login</span>
                </div>
            </a>
            <a href="../index.html" class="logo">
                <img src="../assets/images/logo.png" alt="The Edit">
            </a>
            <a href="../cart/index.html" class="cart-img">
                <img src="../assets/icons/cart.png" alt="cart">
                <span id="cart-count" class="badge" hidden></span>
            </a>
        </nav>
    </header>
    <main>
        <div id="product-container"></div>
    </main>
    <div class="image-modal" id="image-modal">
        <button class="modal-close" id="modal-close">&times;</button>
        <img id="modal-image" src="../assets/images/placeholder.jpg" alt="Black and white 3d background">
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">
                <img src="../assets/images/logo-footer.png" alt="The Edit">
            </div>
            <div class="slogan">
                <p>Curated for modern living</p>
            </div>
        </div>
        <div class="copyright">&copy; 2026 The Edit</div>
    </footer>
    <script type="module" src="../main.js"></script>
    <script type="module" src="../js/product.js"></script>
</body>

</html>
