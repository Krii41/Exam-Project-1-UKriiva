<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/product.css">
    <link rel="stylesheet" href="../css/media.css">
    <title>Product | The Edit</title>
</head>
<body>
    <header id="header"></header>
    <main>
        <article class="product-layout">
            <section class="product-image">   
                <img src="../assets/testimages/3-headphones-beats.jpg" alt="cold headphones">
            </section>
            <section class="product-details">
                <div>
                    <h1>Gold Headphones</h1>
                    <img src="../assets/icons/share.png" alt="share">
                </div>
                <div>
                    <span class="tags">Headphones</span>
                </div>
                <div class="rating">
                    <img src="../assets/icons/star.png" alt="star">
                    <span>4.0</span>
                    <span>(1 review)</span>
                </div>
                <p>$ 382.49</p>
                <p>$ 449.99</p>
                <p>
                    Professional headphones with gold trim.
                </p>
                <button>Add to Cart</button>
            </section>
            <section class="reviews">
                <h2>Reviews</h2>
                <article class="review">
                    <div class="rating">
                        <img src="../assets/icons/star.png" alt="">
                        <img src="../assets/icons/star.png" alt="">
                        <img src="../assets/icons/star.png" alt="">
                        <img src="../assets/icons/star.png" alt="">
                        <img src="../assets/icons/emptystar.png" alt="">
                    </div>
                    <blockquote class="review-text">"Good sound quality"</blockquote>
                    <p class="review-author">Michael J.</p>
                </article>
            </section>
        </article>
    </main>
    <footer id="footer"></footer>
    <script type="module" src="../js/main.js"></script>
</body>
</html>
