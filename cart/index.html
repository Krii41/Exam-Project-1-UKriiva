<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Rewiew your selected items and proceed to checkout">
    <meta name="keywords" content="cart, shopping cart, shopping bag">
    <meta name="author" content="Urve Kriiva">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/cart.css">
    <link rel="stylesheet" href="../css/media.css">
    <title>Cart | The Edit</title>
</head>
<body>
    <header>
        <nav>
            <a href="../account/login.html" class="login">
                <img src="../assets/icons/login.png" alt="login">
            </a>
            <a href="../index.html" class="logo">
                <img src="../assets/images/logo.png"  alt="The Edit">
            </a>
            <a href="../cart/index.html" class="cart-img">
                <img src="../assets/icons/cart.png" alt="">
            </a>
        </nav>
    </header>
    <main>
        <h1>Cart</h1>
        
        <div class="cart-container">
            <button class="clear-cart">Clear cart</button>
            <section class="cart grid">

                <div class="cart-items grid">

                    <article class="cart-item grid">
                        <div class="cart-item-image">
                            <img src="../assets/testimages/3-headphones-beats.jpg" alt="">
                        </div>
                        <h2 class="cart-item-title">Gold Headphones</h2>
                        <p class="item-price">$ 382.49</p>
                        <div class="cart-controls flex">
                            <button class="qty-btn">-</button>
                            <span class="item-qty">3</span>
                            <button class="qty-btn">+</button>
                        </div>   
                        <button class="item-remove">&times;</button>
                    </article>
                    <article class="cart-item grid">
                        <div class="cart-item-image">
                            <img src="../assets/testimages/3-headphones-beats.jpg" alt="">
                        </div>
                        <h2 class="cart-item-title">Gold Headphones</h2>
                        <p class="item-price">$ 382.49</p>
                        <div class="cart-controls flex">
                            <button class="qty-btn">-</button>
                            <span class="item-qty">3</span>
                            <button class="qty-btn">+</button>
                        </div>   
                        <button class="item-remove">&times;</button>
                    </article>

                </div>
    
                <section class="cart-summary">
                    <h2 class="summary-title">Cart Totals</h2>
                    <div class="summary-rows">
                        <div class="summary-row">
                            <span class="summary-label">Shipping</span>
                            <span class="summary-value">Free</span>
                        </div>
                        <div class="summary-row">
                            <span class="summary-label">Subtotal</span>
                            <span class="summary-value">$ 1142.48</span>
                        </div>
                        <div class="summary-row-total">
                            <span class="summary-label">Total</span>
                            <span class="cart-value">$ 1142.48</span>
                        </div>
                    </div>
                    <a href="../checkout/index.html" class="cta-button btn-primary btn-cart">Proceed to Checkout</a>
                </section>
    
    
            </section>
        </div>
    </main>
    <footer>
        <div class="footer-content">
            <div class="footer-logo">
                <img src="../assets/images/logo-footer.png" alt="The Edit">
            </div>
            <span class="slogan">
                <p>Curated for modern living</p>
            </span>
        </div>
        <div class="copyright">&copy; 2026 The Edit</div>
    </footer>
    <script type="module" src="../main.js"></script>
</body>
</html>
