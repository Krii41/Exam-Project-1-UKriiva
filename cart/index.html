<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Rewiew your selected items and proceed to checkout">
    <meta name="keywords" content="cart, shopping cart, shopping bag">
    <meta name="author" content="Urve Kriiva">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/cart.css">
    <link rel="stylesheet" href="../css/media.css">
    <title>Cart | The Edit</title>
</head>
<body>
    <header>
        <nav>
            <a href="../account/login.html" class="login">
                <img src="../assets/icons/login.png" alt="login">
            </a>
            <a href="../index.html" class="logo">
                <img src="../assets/images/logo.png"  alt="The Edit">
            </a>
            <a href="../cart/index.html" class="cart-img">
                <img src="../assets/icons/cart.png" alt="">
                <span id="cart-count" class="badge" hidden></span>
            </a>
        </nav>
    </header>
    <main>
        <h1>Cart</h1>
        <div id="cart-container" class="cart-container">
            <button id="clear-cart" class="clear-cart">Clear cart</button>
            <section class="cart grid">
                <div id="cart-items" class="cart-items grid"></div>
                <section class="cart-summary">
                    <h2 class="summary-title">Cart Totals</h2>
                    <div class="summary-rows">
                        <div class="summary-row">
                            <span class="summary-label">Shipping</span>
                            <span class="summary-value">Free</span>
                        </div>
                        <div class="summary-row">
                            <span class="summary-label">Subtotal</span>
                            <span id="cart-subtotal" class="summary-value">0</span>
                        </div>
                        <div class="summary-row-total">
                            <span class="summary-label">Total</span>
                            <span id="cart-total" class="cart-value">$ 0</span>
                        </div>
                    </div>
                    <a href="../checkout/index.html" class="cta-button btn-primary btn-cart">Proceed to Checkout</a>
                </section>
            </section>
        </div>
        <p id="cart-empty-message" class="empty-cart" hidden>Your shopping cart is empty.</p>
    </main>
    <footer>
        <div class="footer-content">
            <div class="footer-logo">
                <img src="../assets/images/logo-footer.png" alt="The Edit">
            </div>
            <span class="slogan">
                <p>Curated for modern living</p>
            </span>
        </div>
        <div class="copyright">&copy; 2026 The Edit</div>
    </footer>
    <script type="module" src="../main.js"></script>
    <script type="module" src="../js/cart.js"></script>
</body>
</html>
