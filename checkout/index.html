<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Secure checkout at The Edit. Complete your purchase.">
    <meta name="keywords" content="checkout, payment, order">
    <meta name="author" content="Urve Kriiva">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/checkout.css">
    <link rel="stylesheet" href="../css/media.css">
    <title>Checkout | The Edit</title>
</head>
<body>
    <header>
        <nav>
            <a href="../account/login.html" class="login">
                <img src="../assets/icons/login.png" alt="login">
            </a>
            <a href="../index.html" class="logo">
                <img src="../assets/images/logo.png"  alt="The Edit">
            </a>
            <a href="../cart/index.html" class="cart-img">
                <img src="../assets/icons/cart.png" alt="">
                <span id="cart-count" class="badge" hidden></span>
            </a>
        </nav>
    </header>
    <main>
        <h1>Checkout</h1>
        <form action="/action_page.php" class="grid">

            <p class="legend-header">Delivery address</p>
            <fieldset class="delivery grid">
                <legend class="visually-hidden">Delivery address</legend>
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" placeholder="full name" required>
                <label for="address">Address</label>
                <input type="text" id="address" name="address" placeholder="address" required>
                <div class="address-row flex">
                    <div>
                        <label for="postalCode">Postal Code</label>
                        <input type="text" id="postalCode" name="postalCode" placeholder="0000" required>
                    </div>
                    <div>
                        <label for="city">City</label>
                        <input type="text" id="city" name="city" placeholder="City" required>
                    </div>
                </div>
                <label for="country">Country</label>
                <input type="text" id="country" name="country" placeholder="country" required>
            </fieldset>

            <p class="legend-header">Payment</p>
            <fieldset class="payment flex">
                <legend class="visually-hidden">Payment</legend>

                <label class="payment-option grid">
                    <img src="../assets/icons/visa.svg" alt="visa">
                    <input type="radio" name="payment" value="visa">
                    <span class="custom-radio"></span>
                </label>

                <label class="payment-option">
                    <img src="../assets/icons/paypal.svg" alt="paypal">
                    <input type="radio" name="payment" value="paypal">
                    <span class="custom-radio"></span>
                </label>
                
                <label class="payment-option">
                    <img src="../assets/icons/apple-pay.svg" alt="apple-pay">
                    <input type="radio" name="payment" value="apple-pay">
                    <span class="custom-radio"></span>
                </label>

                <label class="payment-option">
                    <img src="../assets/icons/amazon-pay.svg" alt="amazon-pay">
                    <input type="radio" name="payment" value="amazon-pay">
                    <span class="custom-radio"></span>
                </label>
            </fieldset>

            <section class="total flex">
                <span>Total</span>
                <span>$ 1142.48</span>
            </section>
            <a href="../success/" class="cta-button btn-link">Complete Purchase</a>
        </form>
    </main>
    <footer>
        <div class="footer-content">
            <div class="footer-logo">
                <img src="../assets/images/logo-footer.png" alt="The Edit">
            </div>
            <span class="slogan">
                <p>Curated for modern living</p>
            </span>
        </div>
        <div class="copyright">&copy; 2026 The Edit</div>
    </footer>
    <script type="module" src="../main.js"></script>
</body>
</html>
